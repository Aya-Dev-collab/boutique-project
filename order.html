<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <title>نموذج طلب المستخدم</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="container">
        <h2>نموذج طلب المستخدم</h2>

        <form>

            <label>رقم المستخدم:</label>
            <input type="text" placeholder="أدخل رقمك" required>

            <label>العنوان:</label>
            <input type="text" placeholder="أدخل عنوانك" required>

            <input type="text" placeholder="الطلب" required>
            <input type="text" placeholder="اللون" required>
            <input type="text" placeholder="القياس" required>
            <input type="text" placeholder="ملاحظات" required>
            <label>أضف صورة الطلب:</label>
            <input type="file" accept="image/*" required>




            <button type=" submit ">إرسال الطلب</button>

        </form>
    </div>

</body>

</html>
